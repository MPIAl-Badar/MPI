<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;
  --accent:#58a6ff;--gold:#f0b429;--green:#3fb950;--red:#f85149;
  --orange:#e3b341;--purple:#bc8cff;--text:#e6edf3;--muted:#8b949e;--dim:#484f58;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);overflow:hidden;}
body{font-family:'DM Sans',sans-serif;color:var(--text);}
::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px;}

/* Layout */
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;position:relative;overflow:hidden;}

/* Header */
#header{flex-shrink:0;background:rgba(13,17,23,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 16px;z-index:100;}
.header-inner{display:flex;align-items:center;justify-content:space-between;}
.header-logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#1a6bc4);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.logo-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;line-height:1;}
.logo-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.header-actions{display:flex;gap:8px;align-items:center;}
.kelas-toggle{display:flex;background:var(--surface2);border-radius:8px;border:1px solid var(--border);overflow:hidden;}
.kelas-btn{padding:5px 12px;background:transparent;color:var(--muted);border:none;font-size:11px;font-weight:600;transition:all .2s;cursor:pointer;font-family:'DM Sans',sans-serif;}
.kelas-btn.active{background:var(--accent);color:#0d1117;}

/* Content */
#content{flex:1;overflow-y:auto;padding:16px 16px 110px;-webkit-overflow-scrolling:touch;}

/* Bottom Nav */
#nav{position:absolute;bottom:0;left:0;right:0;background:rgba(13,17,23,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:flex-start;padding:10px 6px 26px;z-index:200;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:0;}
#nav::-webkit-scrollbar{display:none;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 4px 6px;background:transparent;border:none;color:var(--muted);font-size:11px;font-weight:500;letter-spacing:.3px;border-radius:12px;transition:color .2s;cursor:pointer;font-family:'DM Sans',sans-serif;position:relative;flex:none;min-width:70px;width:70px;}
.nav-item svg{width:24px;height:24px;}
.nav-item.active{color:var(--accent);}
.nav-dot{width:5px;height:5px;border-radius:50%;background:transparent;transition:background .2s;}
.nav-item.active .nav-dot{background:var(--accent);}
.badge-dot{position:absolute;top:8px;right:14px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--bg);}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;}
.card-hover{transition:border-color .2s,background .2s;cursor:pointer;}
.card-hover:hover{border-color:rgba(88,166,255,.3);background:var(--surface2);}
.section-title{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
.hari-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;}

/* Buttons */
.btn-primary{background:var(--accent);color:#0d1117;border:none;padding:10px 18px;border-radius:8px;font-weight:600;font-size:13px;transition:opacity .2s;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-primary:hover{opacity:.85;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-size:13px;transition:border-color .2s;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-ghost:hover{border-color:rgba(88,166,255,.5);}
.btn-icon{background:transparent;border:none;color:var(--muted);padding:4px;border-radius:6px;display:flex;align-items:center;transition:color .2s;cursor:pointer;}
.btn-icon:hover{color:var(--text);}

/* Inputs */
.input-f{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;width:100%;font-size:14px;outline:none;transition:border-color .2s;font-family:'DM Sans',sans-serif;}
.input-f:focus{border-color:var(--accent);}
.input-f::placeholder{color:var(--dim);}
select.input-f option{background:var(--surface2);color:var(--text);}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:500;}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:sheetUp .3s cubic-bezier(.32,1.2,.63,1);}
.handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;margin-bottom:16px;}
.form-group{display:flex;flex-direction:column;gap:10px;}
.input-label{font-size:11px;color:var(--muted);display:block;margin-bottom:5px;}

/* Toast */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;white-space:nowrap;animation:slideUp .3s ease;display:none;}

/* Animations */
@keyframes slideUp{from{opacity:0;transform:translate(-50%,12px);}to{opacity:1;transform:translate(-50%,0);}}
@keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.anim{animation:fadeIn .25s ease;}
.spin-anim{animation:spin 0.8s linear infinite;}

/* Hero */
.hero{background:linear-gradient(135deg,var(--surface2) 0%,#1a2332 100%);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden;}
.hero-glow{position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(88,166,255,.15) 0%,transparent 70%);border-radius:50%;pointer-events:none;}
.hero-label{font-size:10px;color:var(--accent);letter-spacing:1.5px;margin-bottom:6px;font-weight:600;}
.hero-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;line-height:1.25;margin-bottom:6px;}
.hero-sub{font-size:12px;color:var(--muted);}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;}
.stat-val{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;line-height:1;}
.stat-label{font-size:10px;color:var(--muted);margin-top:4px;}

/* Shared banner */
.shared-banner{background:linear-gradient(90deg,rgba(63,185,80,.15),rgba(88,166,255,.15));border:1px solid rgba(63,185,80,.3);border-radius:10px;padding:8px 14px;font-size:11px;color:var(--green);display:flex;align-items:center;gap:8px;margin-bottom:12px;}

/* Avatar */
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}

/* RPS pertemuan badge */
.pertemuan-badge{min-width:28px;height:28px;border-radius:8px;background:rgba(88,166,255,.15);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--accent);flex-shrink:0;}

/* Back button */
.back-btn{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--accent);font-size:13px;margin-bottom:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;padding:0;}

/* Nav scroll for 7 items */

/* Photo grid */
.photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:8px;}
.photo-cell{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--surface2);cursor:pointer;}
.photo-cell img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s;}
.photo-cell:hover img{transform:scale(1.05);}
.photo-del-btn{position:absolute;top:5px;right:5px;background:rgba(13,17,23,.75);backdrop-filter:blur(4px);border:none;color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;line-height:1;opacity:0;transition:opacity .2s;}
.photo-cell:hover .photo-del-btn{opacity:1;}
.photo-del-btn:hover{background:var(--red);}
.album-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;transition:border-color .2s;}
.album-card:hover{border-color:rgba(88,166,255,.25);}
.upload-zone{background:var(--surface2);border:1.5px dashed var(--border);border-radius:10px;padding:24px 16px;text-align:center;cursor:pointer;transition:border-color .2s;}
.upload-zone:hover{border-color:var(--accent);}

/* RPS file card */
.rps-file-card{background:rgba(240,180,41,.07);border:1px solid rgba(240,180,41,.25);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;}

/* Tab pills */
.tab-pills{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.tab-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;background:transparent;border:1px solid var(--border);color:var(--muted);transition:all .2s;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;}
.tab-pill.active{background:rgba(88,166,255,.18);border-color:var(--accent);color:var(--accent);}
</style>
</head>
<body>

<div id="app">
  <!-- HEADER -->

const SK = { tugas:"mpi_tugas", pengumuman:"mpi_pengumuman", presentasi:"mpi_presentasi", anggota:"mpi_anggota", kelas:"mpi_kelas", dokumentasi:"mpi_dokumentasi", rps:"mpi_rps" };

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){}
}
function load(key) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch(e){ return null; }
}
function loadAll() {
  const t = load(SK.tugas); if(t) state.tugasData = t;
  const p = load(SK.pengumuman); if(p) state.pengumumanData = p;
  const pr = load(SK.presentasi); if(pr) state.presentasiData = pr;
  const a = load(SK.anggota); if(a) state.anggota = a;
  const k = load(SK.kelas); if(k) state.kelas = k;
  const dok = load(SK.dokumentasi); if(dok) state.dokumentasiData = dok;
  const rps = load(SK.rps); if(rps) state.rpsData = rps;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const HARI_NAMES = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
function hariNow(){ return HARI_NAMES[new Date().getDay()]; }

function deadlineDiff(d){
  if(!d) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((new Date(d)-now)/86400000);
}
function deadlineColor(d){
  if(d===null) return 'var(--muted)';
  if(d<0||d<=2) return 'var(--red)';
  if(d<=7) return 'var(--orange)';
  return 'var(--green)';
}
function deadlineLabel(d){
  if(d===null) return "";
  if(d<0) return `Terlambat ${Math.abs(d)} hari`;
  if(d===0) return "Hari ini!";
  if(d===1) return "Besok!";
  return `${d} hari lagi`;
}
function fmtDate(s){ return new Date(s).toLocaleDateString("id-ID",{day:"numeric",month:"short",year:"numeric"}); }
function fmtDateLong(s){ return new Date(s).toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long"}); }
function escHtml(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function jabatanColor(j){
  return ({Kosma:'var(--gold)',  "Wakil Kosma":'var(--orange)', Bendahara:'var(--green)', Sekretaris:'var(--purple)'}[j]||'var(--accent)');
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type='ok'){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type==='warn' ? '#2d1b1b' : '#1b2d1b';
  el.style.border = `1px solid ${type==='warn' ? 'rgba(248,81,73,.4)' : 'rgba(63,185,80,.4)'}`;
  el.style.color = type==='warn' ? 'var(--red)' : 'var(--green)';
  el.style.display = 'block';
  el.style.animation = 'none'; el.offsetHeight; // reflow
  el.style.animation = 'slideUp .3s ease';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.style.display='none'; }, 2800);
}

function addPhotos(albumId){
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='image/*'; inp.multiple=true;
  inp.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(inp);
  inp.onchange = async (e) => {
    const files = Array.from(e.target.files);
    document.body.removeChild(inp);
    if(!files.length) return;
    let count=0;
    for(const file of files){
      await new Promise(res=>{
        const reader = new FileReader();
        reader.onload = ev => {
          const album = state.dokumentasiData.find(d=>d.id==albumId);
          if(album){ album.photos.push({id:Date.now()+Math.random()*1000|0, src:ev.target.result}); count++; }
          res();
        };
        reader.readAsDataURL(file);
      });
    }
    try { save(SK.dokumentasi, state.dokumentasiData); showToast(`${count} foto ditambahkan ✓`); }
    catch(err){ showToast('Storage penuh, coba hapus foto lama','warn'); }
    render();
  };
  inp.addEventListener('cancel', () => { document.body.removeChild(inp); });
  inp.click();
}
function deletePhoto(albumId, photoId){
  const album = state.dokumentasiData.find(d=>d.id==albumId);
  if(album) album.photos = album.photos.filter(p=>p.id!=photoId);
  save(SK.dokumentasi, state.dokumentasiData);
  showToast('Foto dihapus','warn'); render();
}

// ─── RPS UPLOAD ───────────────────────────────────────────────────────────────
function uploadRPS(matkulKey){
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='.pdf,.doc,.docx,.ppt,.pptx,.xlsx,.xls';
  inp.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(inp);
  inp.onchange = e => {
    const file = e.target.files[0];
    document.body.removeChild(inp);
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      state.rpsData[matkulKey] = { nama:file.name, src:ev.target.result, size:file.size, uploadedAt:new Date().toLocaleDateString('id-ID') };
      try { save(SK.rps, state.rpsData); showToast('RPS berhasil diupload ✓'); }
      catch(err){ showToast('File terlalu besar untuk disimpan','warn'); }
      render();
    };
    reader.readAsDataURL(file);
  };
  inp.addEventListener('cancel', () => { document.body.removeChild(inp); });
  inp.click();
}
function deleteRPS(matkulKey){
  delete state.rpsData[matkulKey];
  save(SK.rps, state.rpsData);
  showToast('File RPS dihapus','warn'); render();
}

  if(state.tab==='beranda'){
    const todayJadwal = jadwal.filter(j=>j.hari===hn);
    const urgentTugas = pending.filter(t=>t.deadline).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline)).slice(0,3);

    html = `<div class="anim">

    state.anggota.forEach((a,i)=>{
      const jc = jabatanColor(a.jabatan);
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;${i<state.anggota.length-1?'border-bottom:1px solid var(--border)':''}">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="avatar" style="background:${jc}20;color:${jc}">${escHtml(a.nama[0])}</div>
          <div>
            <div style="font-size:13px;font-weight:500">${escHtml(a.nama)}</div>
            <div style="font-size:10px;color:${jc};font-weight:600">${escHtml(a.jabatan)}</div>
          </div>
        </div>
        <div style="display:flex;gap:4px">
          <button class="btn-icon" onclick="openAnggotaModal(${i})" style="color:var(--accent)">${SVG.edit}</button>
          <button class="btn-icon" onclick="deleteAnggota(${i})" style="color:var(--red)">${SVG.trash}</button>
        </div>
      </div>`;
    });
    html += `</div></div></div>`;
  }

  // ══ JADWAL ═══════════════════════════════════════════════════════════════════
  else if(state.tab==='jadwal'){
    html = `<div class="anim"><div class="section-title">Jadwal Kuliah — ${escHtml(state.kelas)}</div>`;
    ['Selasa','Rabu','Kamis'].forEach(hari=>{
      const items = jadwal.filter(j=>j.hari===hari);
      if(!items.length) return;
      const isToday = hari===hn;
      html+=`<div style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div class="hari-badge" style="background:${isToday?'rgba(88,166,255,.2)':'rgba(72,79,88,.2)'};color:${isToday?'var(--accent)':'var(--muted)'};border:1px solid ${isToday?'var(--accent)':'var(--dim)'}">${hari}</div>
          ${isToday?`<span style="font-size:10px;color:var(--accent);font-weight:600">• Hari Ini</span>`:''}
        </div>`;
      items.forEach(j=>{
        html+=`<div class="card" style="margin-bottom:8px;border-left:3px solid ${isToday?'var(--accent)':'var(--border)'}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div style="flex:1">
              <div style="font-weight:600;font-size:14px;margin-bottom:3px">${escHtml(j.matkul)}</div>
              <div style="display:flex;gap:8px;flex-wrap:wrap">
                <span style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px">${SVG.clock}${escHtml(j.jam)}</span>
                <span style="font-size:11px;color:var(--muted)">Ruang ${escHtml(j.ruang)}</span>
                <span style="font-size:11px;color:var(--muted)">${escHtml(j.kode)}</span>
              </div>
              <div style="font-size:11px;color:var(--muted);margin-top:4px">${escHtml(j.dosen)}</div>
            </div>
            <span class="chip" style="background:rgba(88,166,255,.15);color:var(--accent);margin-left:8px">${j.sks} SKS</span>
          </div>
        </div>`;
      });
      html+=`</div>`;
    });
    html+=`</div>`;
  }

  // ══ MATERI ═══════════════════════════════════════════════════════════════════
  else if(state.tab==='materi' && !state.selectedMatkul){
    html = `<div class="anim"><div class="section-title">Mata Kuliah — ${escHtml(state.kelas)}</div>`;
    allMatkul().forEach(nama=>{
      const j = jadwal.find(x=>x.matkul===nama);
      html+=`<div class="card card-hover" style="margin-bottom:10px" onclick="openMatkul('${escHtml(nama).replace(/'/g,"\\'")}')">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:40px;height:40px;border-radius:10px;background:rgba(88,166,255,.15);border:1px solid rgba(88,166,255,.3);display:flex;align-items:center;justify-content:center">${SVG.book}</div>
          <div style="flex:1">
            <div style="font-weight:600;font-size:14px">${escHtml(nama)}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">${j?.sks||'–'} SKS · ${escHtml(j?.dosen||'–')}</div>
          </div>
          ${SVG.chev}
        </div>
      </div>`;
    });
    html+=`</div>`;
  }
  else if(state.tab==='materi' && state.selectedMatkul){
    const nama = state.selectedMatkul;
    const j = jadwal.find(x=>x.matkul===nama);
    const rpsKey = state.kelas + '_' + nama;
    const rps = state.rpsData[rpsKey];
    const ext = rps ? rps.nama.split('.').pop().toUpperCase() : '';
    const fmtSize = rps ? (rps.size > 1048576 ? (rps.size/1048576).toFixed(1)+' MB' : (rps.size/1024).toFixed(0)+' KB') : '';
    html = `<div class="anim">
      <button class="back-btn" onclick="state.selectedMatkul=null;render()">${SVG.back} Kembali</button>
      <div style="background:var(--surface2);border-radius:12px;padding:14px;margin-bottom:14px;border:1px solid var(--border)">
        <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px">${escHtml(nama)}</div>
        ${j?`<div style="font-size:12px;color:var(--muted);margin-top:4px">${j.sks} SKS · ${escHtml(j.hari)} ${escHtml(j.jam)} · Ruang ${escHtml(j.ruang)}<br/><span style="color:var(--text)">${escHtml(j.dosen)}</span></div>`:''}
      </div>
      <div class="section-title">📋 Rencana Perkuliahan (RPS)</div>
      ${rps ? `
      <div class="rps-file-card" style="margin-bottom:10px">
        <div style="width:44px;height:44px;border-radius:10px;background:rgba(240,180,41,.18);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">📄</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(rps.nama)}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${ext} · ${fmtSize} · ${escHtml(rps.uploadedAt)}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
          <a href="${rps.src}" download="${escHtml(rps.nama)}" style="background:rgba(88,166,255,.15);border:1px solid rgba(88,166,255,.4);color:var(--accent);padding:6px 12px;border-radius:6px;font-size:12px;text-decoration:none;text-align:center">⬇ Unduh</a>
          <button onclick="deleteRPS('${rpsKey.replace(/'/g,"\\'")}');" style="background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--red);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer">× Hapus</button>
        </div>
      </div>
      <button onclick="uploadRPS('${rpsKey.replace(/'/g,"\\'")}');" style="width:100%;background:transparent;border:1px dashed var(--border);color:var(--muted);padding:8px;border-radius:8px;font-size:12px;cursor:pointer">🔄 Ganti File RPS</button>
      ` : `
      <div class="card" style="text-align:center;padding:32px 20px">
        <div style="font-size:42px;margin-bottom:10px">📄</div>
        <div style="font-size:14px;color:var(--muted);margin-bottom:6px">Belum ada file RPS</div>
        <div style="font-size:12px;color:var(--dim);margin-bottom:14px">Upload file PDF, Word, atau PowerPoint</div>
        <button onclick="uploadRPS('${rpsKey.replace(/'/g,"\\'")}');" style="background:var(--accent);color:#0d1117;border:none;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">📎 Upload File RPS</button>
      </div>
      `}
    </div>`;
  }

  // ══ DOKUMENTASI ══════════════════════════════════════════════════════════════
  else if(state.tab==='dokumentasi'){
    html=`<div class="anim">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div class="section-title" style="margin:0">📸 Dokumentasi Kelas</div>
        <button class="btn-primary" style="padding:7px 14px;font-size:12px" onclick="openDokumentasiModal()">+ Album</button>
      </div>
      <div style="font-size:11px;color:var(--dim);margin-bottom:14px">Upload foto kegiatan kelas — disimpan di browser HP ini</div>`;

    if(!state.dokumentasiData.length){
      html+=`<div class="card" style="text-align:center;padding:44px 20px">
        <div style="font-size:52px;margin-bottom:12px">📷</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:6px">Belum ada dokumentasi</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:16px">Buat album dan upload foto kegiatan kelas kamu</div>
        <button class="btn-primary" onclick="openDokumentasiModal()">+ Buat Album Pertama</button>
      </div>`;
    } else {
      state.dokumentasiData.forEach(album=>{
        html+=`<div class="album-card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
            <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
              <div style="width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,rgba(88,166,255,.2),rgba(188,140,255,.2));border:1px solid rgba(88,166,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">📷</div>
              <div style="min-width:0">
                <div style="font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(album.judul)}</div>
                <div style="font-size:10px;color:var(--muted);margin-top:1px">${album.photos.length} foto · ${escHtml(album.createdAt)}</div>
              </div>
            </div>
            <div style="display:flex;gap:3px;flex-shrink:0;margin-left:8px">
              <button class="btn-icon" onclick="openDokumentasiModal(${album.id})" style="color:var(--accent)" title="Edit judul">${SVG.edit}</button>
              <button class="btn-icon" onclick="addPhotos(${album.id})" style="color:var(--green)" title="Upload foto">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
              </button>
              <button class="btn-icon" onclick="deleteDokumentasi(${album.id})" style="color:var(--red)" title="Hapus album">${SVG.trash}</button>
            </div>
          </div>`;

        if(!album.photos.length){
          html+=`<div class="upload-zone" onclick="addPhotos(${album.id})">
            <div style="font-size:28px;margin-bottom:6px">🖼️</div>
            <div style="font-size:13px;color:var(--muted);margin-bottom:4px">Belum ada foto</div>
            <div style="font-size:11px;color:var(--dim)">Tap untuk upload foto</div>
          </div>`;
        } else {
          html+=`<div class="photo-grid">`;
          album.photos.forEach(photo=>{
            html+=`<div class="photo-cell" onclick="openPhotoViewer('${photo.src.replace(/'/g,"\\'")}')">
              <img src="${photo.src}" loading="lazy"/>
              <button class="photo-del-btn" onclick="event.stopPropagation();deletePhoto(${album.id},${photo.id})">×</button>
            </div>`;
          });
          html+=`</div>
          <button onclick="addPhotos(${album.id})" style="width:100%;background:rgba(88,166,255,.07);border:1px dashed rgba(88,166,255,.25);color:var(--accent);padding:9px;border-radius:8px;font-size:12px;cursor:pointer;margin-top:8px;font-weight:500">+ Tambah Foto</button>`;
        }

        html+=`</div>`;
      });
    }
    html+=`</div>`;
  }

  // ══ TUGAS ════════════════════════════════════════════════════════════════════
  else if(state.tab==='tugas'){
    const pend = pending.sort((a,b)=>{ if(!a.deadline&&!b.deadline)return 0; if(!a.deadline)return 1; if(!b.deadline)return -1; return new Date(a.deadline)-new Date(b.deadline); });
    const done = state.tugasData.filter(t=>t.selesai);
    html=`<div class="anim">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="section-title" style="margin:0">Tugas & Deadline</div>
        <button class="btn-primary" style="padding:7px 14px;font-size:12px" onclick="openTugasModal()">+ Tambah</button>
      </div>`;
    if(!state.tugasData.length){
      html+=`<div class="card" style="text-align:center;padding:40px 20px"><div style="font-size:36px;margin-bottom:10px">📝</div><div style="color:var(--muted);font-size:14px">Belum ada tugas</div></div>`;
    } else {
      if(pend.length){
        html+=`<div class="section-title">Belum Selesai (${pend.length})</div>`;
        pend.forEach(t=>{
          const diff=deadlineDiff(t.deadline); const col=deadlineColor(diff);
          html+=`<div class="card" style="margin-bottom:10px;border-left:3px solid ${col}">
            <div style="display:flex;justify-content:space-between;gap:8px">
              <div style="flex:1">
                <div style="font-weight:600;font-size:14px">${escHtml(t.judul)}</div>
                ${t.matkul?`<span class="chip" style="background:rgba(88,166,255,.15);color:var(--accent);margin-top:4px">${escHtml(t.matkul)}</span>`:''}
                ${t.deskripsi?`<div style="font-size:12px;color:var(--muted);margin-top:5px;line-height:1.5">${escHtml(t.deskripsi)}</div>`:''}
                ${t.deadline?`<span style="font-size:11px;color:${col};font-weight:600;display:flex;align-items:center;gap:4px;margin-top:6px">${SVG.clock}${fmtDate(t.deadline)} · ${deadlineLabel(diff)}</span>`:''}
              </div>
              <div style="display:flex;flex-direction:column;gap:4px">
                <button onclick="openTugasModal(${t.id})" style="background:rgba(88,166,255,.15);border:1px solid rgba(88,166,255,.4);color:var(--accent);padding:5px 8px;border-radius:6px;font-size:12px;cursor:pointer">✎</button>
                <button onclick="toggleTugas(${t.id})" style="background:rgba(63,185,80,.15);border:1px solid rgba(63,185,80,.4);color:var(--green);padding:5px 8px;border-radius:6px;font-size:12px;cursor:pointer">✓</button>
                <button onclick="deleteTugas(${t.id})" style="background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--red);padding:5px 8px;border-radius:6px;font-size:12px;cursor:pointer">×</button>
              </div>
            </div>
          </div>`;
        });
      }
      if(done.length){
        html+=`<div class="section-title" style="margin-top:16px">Selesai ✓</div>`;
        done.forEach(t=>{
          html+=`<div class="card" style="margin-bottom:8px;opacity:.5">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div style="font-size:13px;text-decoration:line-through;color:var(--muted)">${escHtml(t.judul)}</div>
              <div style="display:flex;gap:4px">
                <button onclick="toggleTugas(${t.id})" style="background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 8px;border-radius:6px;font-size:12px;cursor:pointer">↩</button>
                <button onclick="deleteTugas(${t.id})" style="background:transparent;border:none;color:var(--red);padding:4px 6px;border-radius:6px;font-size:14px;cursor:pointer">×</button>
              </div>
            </div>
          </div>`;
        });
      }
    }
    html+=`</div>`;
  }

  // ══ PRESENTASI ═══════════════════════════════════════════════════════════════
  else if(state.tab==='presentasi'){
    html=`<div class="anim">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="section-title" style="margin:0">Jadwal Presentasi</div>
        <button class="btn-primary" style="padding:7px 14px;font-size:12px" onclick="openPresentasiModal()">+ Tambah</button>
      </div>`;
    const sorted = [...state.presentasiData].sort((a,b)=>{ if(!a.tanggal&&!b.tanggal)return 0; if(!a.tanggal)return 1; if(!b.tanggal)return -1; return new Date(a.tanggal)-new Date(b.tanggal); });
    if(!sorted.length){
      html+=`<div class="card" style="text-align:center;padding:40px 20px"><div style="font-size:36px;margin-bottom:10px">🎤</div><div style="color:var(--muted);font-size:14px">Belum ada jadwal presentasi</div></div>`;
    } else {
      sorted.forEach(p=>{
        const diff=deadlineDiff(p.tanggal); const upcoming=diff!==null&&diff>=0;
        html+=`<div class="card" style="margin-bottom:10px;border-left:3px solid ${upcoming?'var(--purple)':'var(--dim)'}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div style="flex:1">
              <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px;flex-wrap:wrap">
                <div style="font-weight:600;font-size:14px">${escHtml(p.nama)}</div>
                ${p.kelompok?`<span class="chip" style="background:rgba(188,140,255,.15);color:var(--purple)">${escHtml(p.kelompok)}</span>`:''}
              </div>
              ${p.matkul?`<div style="font-size:12px;color:var(--accent)">${escHtml(p.matkul)}</div>`:''}
              ${p.topik?`<div style="font-size:12px;color:var(--muted);margin-top:3px">Topik: ${escHtml(p.topik)}</div>`:''}
              ${p.tanggal?`<div style="font-size:11px;color:${upcoming?'var(--purple)':'var(--muted)'};margin-top:5px;display:flex;align-items:center;gap:4px;font-weight:${upcoming?600:400}">${SVG.cal}${fmtDateLong(p.tanggal)}${upcoming?` · ${deadlineLabel(diff)}`:''}</div>`:''}
            </div>
            <button class="btn-icon" onclick="deletePresentasi(${p.id})" style="color:var(--red)">${SVG.trash}</button>
          </div>
        </div>`;
      });
    }
    html+=`</div>`;
  }

  // ══ PENGUMUMAN ════════════════════════════════════════════════════════════════
  else if(state.tab==='pengumuman'){
    html=`<div class="anim">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="section-title" style="margin:0">Pengumuman</div>
        <button class="btn-primary" style="padding:7px 14px;font-size:12px" onclick="openPengumumanModal()">+ Buat</button>
      </div>`;
    if(!state.pengumumanData.length){
      html+=`<div class="card" style="text-align:center;padding:40px 20px"><div style="font-size:36px;margin-bottom:10px">📢</div><div style="color:var(--muted);font-size:14px">Belum ada pengumuman</div></div>`;
    } else {
      [...state.pengumumanData].reverse().forEach(p=>{
        html+=`<div class="card" style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
            <div style="font-weight:600;font-size:14px;flex:1;margin-right:8px">${escHtml(p.judul)}</div>
            <div style="display:flex;gap:4px;align-items:center">
              <span style="font-size:10px;color:var(--muted);white-space:nowrap">${escHtml(p.tanggal)}</span>
              <button class="btn-icon" onclick="openPengumumanModal(${p.id})" style="color:var(--accent)">${SVG.edit}</button>
              <button class="btn-icon" onclick="deletePengumuman(${p.id})" style="color:var(--red)">${SVG.trash}</button>
            </div>
          </div>
          ${p.isi?`<div style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:6px">${escHtml(p.isi)}</div>`:''}
          <div style="font-size:11px;color:var(--accent)">— ${escHtml(p.oleh)}</div>
        </div>`;
      });
    }
    html+=`</div>`;
  }

  el.innerHTML = html;
}

function openMatkul(nama){
  state.selectedMatkul = nama;
  render();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadAll();
document.getElementById('btn-mpi1').classList.toggle('active', state.kelas==='MPI-I');
document.getElementById('btn-mpi2').classList.toggle('active', state.kelas==='MPI-II');
render();
</script>
</body>
</html>
